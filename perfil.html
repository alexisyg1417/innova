<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | INNOVA</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --primary-navy: #1a2a3a;
            --accent-gold: #c5a059;
        }

        .profile-avatar-container {
            width: 150px;
            height: 150px;
            position: relative;
            margin: 0 auto 20px;
        }

        .profile-avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 4px solid white;
        }

        .btn-edit-avatar {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--primary-navy);
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit-avatar:hover {
            background: var(--accent-gold);
        }

        .btn-gold-custom {
            background-color: var(--accent-gold) !important;
            color: white !important;
            border: none !important;
            transition: all 0.3s ease;
        }

        .btn-gold-custom:hover {
            background-color: #b38f4d !important;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg fixed-top navbar-glass py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-building me-2 text-primary-custom fs-3"></i>
                <span class="brand-text fs-4 text-dark mb-0">INNOVA</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-1 text-dark"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link fw-bold text-dark" href="inventario.html">Catálogo</a></li>
                    
                    <li class="nav-item d-flex gap-2" id="auth-buttons">
                        <a href="login.html" class="btn btn-outline-dark px-4">Ingresar</a>
                        <a href="register.html" class="btn btn-dark-custom px-4">Únete</a>
                    </li>
                    
                    <li class="nav-item d-none" id="user-menu">
                        <div class="dropdown">
                            <button class="btn btn-dark-custom dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-1"></i> <span id="username-display">Usuario</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item" href="cliente.html">Mi Panel</a></li>
                                <li><a id="admin-link" class="dropdown-item d-none" href="admin.html">Panel Admin</a></li> 
                                <li><hr class="dropdown-divider"></li>
                                <li><button class="dropdown-item text-danger" onclick="handleLogout()">Cerrar Sesión</button></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 container" style="margin-top: 110px; margin-bottom: 50px;">
        <div class="row g-4">
            
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <div class="text-center">
                        <div class="profile-avatar-container">
                            <img id="profile-avatar" src="https://via.placeholder.com/150" class="rounded-circle shadow-sm" alt="Foto de perfil">
                            <label for="upload-avatar" class="btn-edit-avatar shadow">
                                <i class="bi bi-camera-fill"></i>
                            </label>
                            <input type="file" id="upload-avatar" class="d-none" accept="image/*" onchange="subirAvatar()">
                        </div>
                        <h4 id="display-name" class="font-serif fw-bold mb-1">Cargando...</h4>
                        <p id="display-email" class="text-muted small mb-4">usuario@correo.com</p>
                    </div>

                    <form id="form-perfil" onsubmit="updateProfile(event)">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted text-uppercase">Nombre Completo</label>
                            <input type="text" id="perfil-nombre" class="form-control form-control-lg fs-6 shadow-sm" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted text-uppercase">WhatsApp / Teléfono</label>
                            <input type="tel" id="perfil-tel" class="form-control form-control-lg fs-6 shadow-sm" placeholder="Ej: 2221234567">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted text-uppercase">Sobre mí (Biografía)</label>
                            <textarea id="perfil-bio" class="form-control shadow-sm" rows="4" placeholder="Cuéntales a tus clientes quién eres..."></textarea>
                        </div>
                        <div id="perfil-msg" class="alert d-none small text-center"></div>
                        <button type="submit" id="btn-save-perfil" class="btn btn-gold-custom w-100 py-3 fw-bold mt-2">
                            Guardar Cambios
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                        <h5 class="font-serif fw-bold mb-0">
                            <i class="bi bi-grid-3x3-gap me-2 text-primary"></i> Mis Propiedades Publicadas
                        </h5>
                        <a href="publicar.html" class="btn btn-dark btn-sm rounded-pill px-3">+ Nueva</a>
                    </div>

                    <div id="mis-propiedades-container" class="row g-3">
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <p class="mt-2 small">Sincronizando tus publicaciones...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-4 bg-white border-top w-100 mt-auto">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <span class="font-serif fw-bold fs-5" style="color: var(--primary-navy); letter-spacing: 2px;">INNOVA</span>
                    <p class="text-muted small mb-0 mt-1">© 2026 INNOVA Real Estate Services UTP. Proyecto Universitario.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3 fs-5">
                        <a href="#" class="text-dark"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-linkedin"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Disparador inicial al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            loadUserProfile();
        });
    </script>
</body>
</html>
