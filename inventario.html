<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="logo.png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Navbar Glassmorphism corregido */
        .navbar-glass {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Hero Section reparado (Asegura que cargue la imagen y no colapse) */
        .hero-section {
            background: linear-gradient(rgba(26, 42, 58, 0.8), rgba(26, 42, 58, 0.4)), url('https://images.unsplash.com/photo-1600596542815-2495db98dada?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            min-height: 100vh;
            padding-top: 120px; /* Evita que el navbar tape el contenido */
            display: flex;
            align-items: center;
        }

        /* Stats transparentes */
        .stat-card {
            border-left: 2px solid var(--accent-color);
            padding-left: 15px;
        }

        /* Buscador Flotante arreglado (Ya no se superpone feo) */
        .search-overlay {
            margin-top: -60px; /* Lo sube ligeramente sobre el hero */
            position: relative;
            z-index: 10;
        }
        
        .search-box-luxury {
            background: white;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 4px;
        }

        /* Botón de lujo corregido */
        .btn-luxury {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 35px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-luxury:hover {
            background-color: #a38243;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4);
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top navbar-glass py-3">

                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                                <li><hr class="dropdown-divider"></li>
                                <li><button class="dropdown-item text-danger" onclick="handleLogout()">Cerrar Sesión</button></li>
                            </ul>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

                </div>
               
            </div>
             <div class="search-bar-container shadow-sm bg-white p-4 rounded-4">

        <div class="col-md-3">
            <label class="small fw-bold text-muted text-uppercase mb-2 d-block">Ubicación</label>

                <option value="todos">Casas</option>
                <option value="Departamento">Departamentos</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="small fw-bold text-muted text-uppercase mb-2 d-block">Operación</label>

            </select>
        </div>
        <div class="col-md-3">

    </div>
